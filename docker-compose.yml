services:
  postgres:
    image: postgres:16-alpine
    container_name: eden-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eden"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eden-backend
    restart: unless-stopped
    environment:
      # Настройки базы данных
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Секреты и порты
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT}
      # ВАЖНО: Передаем адрес фронтенда для настройки CORS
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # ВАЖНО: Передаем API URL внутрь сборки образа (Build time)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: eden-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:3000"
    environment:
      # Дублируем для runtime (на всякий случай, хотя для NEXT_PUBLIC главное - args выше)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data: